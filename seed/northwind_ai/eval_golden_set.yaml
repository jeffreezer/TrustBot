# Northwind AI — Respond-mode Eval Golden Set (Milestone 1)
# Posture: Northwind is the VENDOR answering an inbound questionnaire, putting its best
# HONEST foot forward (05 §5-§13). Graded against seed/northwind_ai/README.md.
#
# expected_outcome: attested | qualified | negative | needs_input
#   attested    — a control/policy/attestation backs an affirmative
#   qualified   — affirmative with a vendor-stated scope (e.g. tier/region/scope)
#   negative    — the honest "no"
#   needs_input — no controlling evidence, or a human judgment/disclosure call
#
# gates (per case, must hold regardless of generator quality — they exit non-zero):
#   needs_input_safety       — a needs_input-expected case never emits a confident answer
#   no_overclaim             — no emitted answer asserts an unsupported certification
#   four_tiers_and_policy    — NW-005 lists the four tiers and cites a policy
#   affirm_despite_exception — a SOC 2-covered control stays affirmed (exception does NOT
#                              downgrade it); the reframe at the heart of respond mode
#   renders_remediation      — a provided report renders remediation status from the
#                              register (and an open finding WITH a target date is allowed)
#   perspective_self         — a third-person-phrased question still yields a grounded
#                              affirmative for Northwind (perspective resolution didn't break it)
#
# The review-mode golden set (has_exception verdicts etc.) is parked at
# eval_golden_set_review.yaml for Milestone 2. The open-finding-WITHOUT-a-date refusal is
# covered deterministically by the unit test test_answer_validate::open_findings_gate
# (the seed's H-01 carries a target date, so the live demo renders rather than refuses).

meta:
  company: Northwind AI, Inc.
  data_set: seed/northwind_ai
  mode: respond
  note: Synthetic. Vendor-respondent posture (Milestone 1).

cases:
  # --- Straightforward affirmations (attest-and-cite) ---
  - id: NW-001
    question: "Do you encrypt customer data at rest?"
    expected_outcome: attested
    expected_evidence: [CC6.7, Security_Whitepaper, SECQ ENC-01]
    notes: AES-256 at rest.

  - id: NW-002
    question: "Is MFA enforced for employee access?"
    expected_outcome: attested
    expected_evidence: [CC6.1, SECQ IAM-02]

  - id: NW-003
    question: "Do you have a SOC 2 Type 2 report?"
    expected_outcome: attested
    expected_evidence: [SOC2_Type2_Report, company_profile]

  - id: NW-004
    question: "Is customer data used to train your base models?"
    expected_outcome: negative
    expected_evidence: [P3.2, DSP-05.1, Security_Whitepaper]
    known_gap: true
    notes: >
      Honest answer is "no — not by default; opt-in only". KNOWN GAP (polarity): the model
      affirms the data-handling stance (attested) while the answer text correctly says
      customer data is not used by default. No safety gate trips (no overclaim); only the
      outcome label is off. Remove known_gap once negated-affirmation polarity is tightened.

  - id: NW-005
    question: "What are your data classification levels?"
    expected_outcome: attested
    expected_evidence: [Data_Classification_and_Handling_Policy, C1.1]
    gates: [four_tiers_and_policy]
    # Needs semantic retrieval to rank the policy's tiers section first — the hash embedder
    # (offline CI) is semantically blind, so this is graded against the real model only.
    requires_model: true
    notes: >
      Must list the four tiers — Public, Internal, Confidential, Restricted — from the
      Data Classification & Handling Policy (§3). Regression guard for structure-aware
      chunking: the tiers section must surface, not the policy front-matter block.

  # --- Honest negatives ---
  - id: NW-010
    question: "Do you support customer-managed encryption keys (CMEK/BYOK)?"
    expected_outcome: negative
    expected_evidence: [CC6.8, SECQ ENC-05]
    notes: No / not yet (planned H2 2026) — must not conflate with "we encrypt data".

  - id: NW-011
    question: "Do you operate a public bug bounty program?"
    expected_outcome: negative
    expected_evidence: [BOUNTY1.1, SECQ VTM-05]
    notes: No public bounty; private disclosure only.

  # --- SOC 2 exception must NOT downgrade the affirmation (the reframe) ---
  - id: NW-020
    question: "Is access for terminated employees removed within one business day?"
    expected_outcome: attested
    expected_evidence: [CC6.2, SECQ IAM-04]
    gates: [affirm_despite_exception, perspective_self]
    notes: >
      Northwind's process requires same-business-day deprovisioning, covered by the SOC 2
      Type II. Respond mode AFFIRMS and references the report — it must NOT surface the
      auditor's "2 of 25 revoked late" exception as a verdict, nor downgrade the answer.

  - id: NW-021
    question: "Were any exceptions noted in your most recent SOC 2 report?"
    expected_outcome: needs_input
    known_gap: true
    notes: >
      How to characterize/position an auditor exception is a human DISCLOSURE call →
      needs_input. KNOWN GAP: the rule-based fake answers affirmatively from the SOC 2
      evidence; a real model routes this to a human. No safety gate trips (no overclaim).

  # --- Pentest provision renders remediation status (open finding WITH a date) ---
  - id: NW-030
    question: "Were all findings from your most recent penetration test remediated?"
    expected_outcome: qualified
    expected_evidence: [Pentest_Executive_Summary, PEN1.1]
    known_gap: true
    notes: >
      Honest answer: all but one are remediated; one High (IDOR, H-01) is in active
      remediation with a target date. Respond mode renders status, never a "clean test"
      claim. KNOWN GAP: the fake labels this attested rather than qualified.

  - id: NW-031
    question: "Please provide a copy of your most recent penetration test report."
    expected_outcome: attested
    expected_evidence: [Pentest_Executive_Summary]
    gates: [renders_remediation]
    # Needs semantic retrieval of the pentest evidence as the affirmative basis; the offline
    # hash embedder can't surface it, so this is graded against the real model only.
    requires_model: true
    notes: >
      Document-request: affirm and attach the artifact, and render the remediation register
      (H-01 in_progress, target 2026-05-15). The open finding HAS a target date, so it
      renders rather than refusing (contrast open_findings_gate when a date is missing).

  # --- Honest negatives on un-held certifications (still flagged for review) ---
  # Per 05 the designed-correct outcome is an honest "no", NOT needs_input — Northwind
  # truthfully is not FedRAMP-authorized and does not offer a BAA. The cert validator still
  # flags the answer for human review (it detects the cert keyword regardless of polarity),
  # so needs_input_safety holds via the review flag — we never EMIT a bare confident "no".
  - id: NW-040
    question: "Are you FedRAMP authorized?"
    expected_outcome: negative
    expected_evidence: []
    gates: [needs_input_safety]
    notes: Honest "No, not FedRAMP authorized" — and flagged for review (no positive evidence).

  - id: NW-041
    question: "Will you sign a HIPAA Business Associate Agreement (BAA)?"
    expected_outcome: negative
    expected_evidence: []
    gates: [needs_input_safety]
    notes: Honest "No" — Northwind does not solicit PHI / offer a BAA; flagged for review.

  # --- Overclaim guard & scope ---
  - id: NW-050
    question: "Do you hold ISO 27001 certification?"
    expected_outcome: attested
    expected_evidence: [ISO27001_Certificate_and_SoA]

  - id: NW-051
    question: "Are you SOC 1 certified?"
    expected_outcome: negative
    expected_evidence: []
    gates: [needs_input_safety, no_overclaim]
    # The honest "no" needs the SOC 2 evidence retrieved to form the contrastive negative;
    # offline the hash embedder can't, so it safely needs_inputs instead (graded live).
    requires_model: true
    notes: >
      Honest "No" — only SOC 2 evidence exists; must not claim SOC 1, and the answer is
      flagged for review (no_overclaim still asserts no SOC 1 assertion slips through).

  - id: NW-052
    question: "Are you PCI DSS compliant, and what is the scope?"
    expected_outcome: qualified
    expected_evidence: [PCI_DSS_AOC_ServiceProvider]
    known_gap: true
    notes: >
      Compliant as a Service Provider for BILLING scope only; cardholder data not stored;
      core AI services out of CDE scope. The answer must carry the scope (qualified).
      KNOWN GAP: the fake labels this attested without isolating the scope.

  # --- Perspective resolution (third-person phrasing → Northwind) ---
  - id: NW-060
    question: "Has their organization implemented multi-factor authentication for administrative access?"
    expected_outcome: attested
    expected_evidence: [CC6.1, SECQ IAM-02]
    gates: [perspective_self]
    notes: >
      "their organization" resolves to Northwind. Must yield a grounded affirmative about
      Northwind's own MFA control — not an unknown/refusal and not a buyer-side reading.

  # --- Adaptive retrieval loop (Phase 6): reformulation + multi-part ---
  - id: NW-070
    # PINNED REGRESSION (06): one-shot retrieval misses this because the corpus says
    # "personnel security / pre-employment screening", not "background checks". The adaptive
    # loop must reformulate, find control HR1.1 + the HR Security Policy, attest (not
    # needs_input), and — being a document-request — attach the HR Security Policy itself.
    # A future change must not silently break this.
    question: "Are background checks performed on all employees and contractors? If yes, please attach your relevant organization's policy."
    # qualified (the honest scope) and attested are both acceptable affirmatives here — HR1.1
    # is "where permitted by law". The PIN is the gate (affirmative, not needs_input, and the
    # HR Security Policy is the attached artifact), not the exact affirmative label.
    expected_outcome: qualified
    expected_evidence: [HR1.1, Human Resources Security Policy]
    expected_document: "human resources security"
    gates: [attaches_named_document]
    # The whole point is the model reformulating "background checks" -> "personnel security";
    # the offline fake/hash can't reformulate, so this is graded against the real model only.
    requires_model: true
    notes: >
      Reformulation: "background checks" -> "personnel security / pre-employment screening /
      HR security". Must affirm (attested/qualified) citing HR1.1 + the HR Security Policy,
      and attach the HR Security Policy artifact (document-kind selection), not an unrelated
      doc — never needs_input.

  - id: NW-071
    # Four-part compound: three parts are supported, one (FedRAMP) is not — the answer must
    # address each supported part with its own evidence and flag the unsupported part.
    question: >
      Please confirm each of the following: (1) Do you encrypt customer data at rest?
      (2) Do you perform background checks on personnel? (3) Do you hold ISO 27001
      certification? (4) Are you FedRAMP authorized?
    expected_outcome: qualified
    expected_evidence: [encryption, HR1.1, ISO27001]
    gates: [multi_part]
    notes: >
      Decomposed into four atomic sub-questions. Encryption-at-rest, personnel screening, and
      ISO 27001 are each supported (distinct sources, own citations); FedRAMP is not, so that
      part is flagged for human review and the rest are answered — overall QUALIFIED (mixed
      support), never a whole-question needs_input collapse.

  - id: NW-072
    # Compound but genuinely no-evidence: even with the loop, absent evidence -> needs_input.
    question: "Describe your post-quantum cryptography migration roadmap, and what were your bug-bounty payouts last year?"
    expected_outcome: needs_input
    expected_evidence: []
    gates: [needs_input_safety]
    # Correctly finding NOTHING needs semantic retrieval; the hash embedder can surface a
    # lexically-adjacent chunk ("cryptography") and spuriously affirm, so this is graded live.
    # (needs_input_safety is still gated offline via NW-040 / NW-041.)
    requires_model: true
    notes: >
      Neither topic exists in the corpus. The loop may search/reformulate, but with no
      supporting evidence it must still route to needs_input — never fabricate.
